<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - CodeAlpha Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="brand">🛒 CodeAlpha Shop</a>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <main class="container">
    <div class="form-wrap">
      <h2>Create Account</h2>
      <div id="alert"></div>
      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input class="form-control" type="text" name="name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" name="email" required />
        </div>
        <div class="form-group">
          <label>Password (min 6 chars)</label>
          <input class="form-control" type="password" name="password" minlength="6" required />
        </div>
        <button class="btn btn-block" type="submit">Sign Up</button>
      </form>
      <p class="center muted" style="margin-top:1rem;">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
