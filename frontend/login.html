<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CodeAlpha Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="brand">🛒 CodeAlpha Shop</a>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <main class="container">
    <div class="form-wrap">
      <h2>Login</h2>
      <div id="alert"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" type="email" name="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" required />
        </div>
        <button class="btn btn-block" type="submit">Login</button>
      </form>
      <p class="center muted" style="margin-top:1rem;">
        No account? <a href="register.html">Sign up</a>
      </p>
      <p class="center muted" style="margin-top:0.5rem; font-size:0.85rem;">
        Demo: user@shop.com / user123
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
